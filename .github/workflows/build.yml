name: Build EXE from HTML

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Install Nativefier
      run: npm install -g nativefier
      
    - name: Build EXE
      run: nativefier --name "GadgetCharger" --platform windows --arch x64 --width 1000 --height 750 .
      
    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: GadgetCharger
        path: GadgetCharger-win32-x64/
